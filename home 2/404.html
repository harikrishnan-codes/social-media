<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <link rel="icon" href="../assets/bg remove.webp">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./root.css">

    <!-- material icon -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- font awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- aos animations -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

</head>

<body>
    <style>

        /* --- 404 Page Styles --- */
        .error-page {
            min-height: 100vh;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .error-container {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        /* 404 Visuals */
        .error-visual {
            position: relative;
            margin-bottom: 40px;
        }

        .glitch-text {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: white;
            text-shadow: 10px 10px 0px rgba(255, 94, 126, 0.1);
            letter-spacing: -5px;
            animation: textFloat 4s ease-in-out infinite;
        }

        .floating-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--brand-primary);
            filter: drop-shadow(0 20px 30px rgba(255, 94, 126, 0.3));
            animation: heartBeat 2s ease-in-out infinite;
            cursor: pointer;
        }

        .floating-heart:hover {
            color: var(--brand-secondary);
        }

        /* Animations */
        @keyframes textFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            15% {
                transform: translate(-50%, -50%) scale(1.2);
            }

            30% {
                transform: translate(-50%, -50%) scale(1);
            }

            45% {
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        /* Content & Buttons */
        .error-content h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .error-content p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-back {
            background: var(--gradient-btn);
            color: white;
            padding: 16px 35px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(255, 94, 126, 0.2);
            transition: var(--transition);
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 94, 126, 0.3);
        }

        .btn-ghost {
            padding: 16px 35px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            transition: var(--transition);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Decorative Blurs */
        .bg-blur {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: 1;
        }

        .blur-1 {
            background: var(--brand-primary);
            top: -100px;
            left: -100px;
        }

        .blur-2 {
            background: var(--brand-secondary);
            bottom: -100px;
            right: -100px;
        }

        /* --- Mobile (768px) --- */
        @media (max-width: 768px) {
            .glitch-text {
                font-size: 6rem;
            }

            .floating-heart {
                font-size: 2.5rem;
            }

            .error-content h2 {
                font-size: 1.8rem;
            }

            .error-actions {
                flex-direction: column;
            }

            .btn-back,
            .btn-ghost {
                width: 100%;
            }
        }

    </style>



    <div class="error-page">
        <div class="error-container">
            <div class="error-visual">
                <h1 class="glitch-text">404</h1>
                <div class="floating-heart">
                    <i class="fas fa-heart"></i>
                    <div class="heart-shadow"></div>
                </div>
            </div>

            <div class="error-content">
                <h2>Post not found.</h2>
                <p>The link you followed may be broken, or the creator may have deleted this moment. Let's get you back
                    to the pulse.</p>

                <div class="error-actions">
                    <a href="index.html" class="btn-back">Return to Feed</a>
                    <!-- <a href="#" class="btn-ghost">Report Issue</a> -->
                </div>
            </div>
        </div>

        <div class="bg-blur blur-1"></div>
        <div class="bg-blur blur-2"></div>
    </div>

</body>

</html>
